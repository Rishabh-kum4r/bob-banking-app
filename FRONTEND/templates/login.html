<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SecureBank</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f7f8fa; }
    .brand-header { background-color: #1a3c5e; color: #fff; padding: 0.75rem 1.5rem; }
    .brand-header h1 { font-size: 1.4rem; margin: 0; letter-spacing: 0.04em; }
    .login-card { margin-top: 6rem; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header class="brand-header">
    <h1>&#127968; SecureBank</h1>
  </header>

  <div class="container">
    <div class="row justify-content-center login-card">
      <div class="col-md-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h4 class="card-title mb-1 text-center">Customer Login</h4>
            <p class="text-muted text-center mb-4" style="font-size:0.85rem;">Sign in to access your account</p>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{ error }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <form method="POST" action="/login" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter your username" autocomplete="username" required>
              </div>
              <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter your password" autocomplete="current-password" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
              </div>
            </form>
          </div>
        </div>
        <p class="text-center text-muted mt-3" style="font-size:0.8rem;">
          Protected by SecureBank security. All activity is monitored.
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
