<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw — SecureBank</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f7f8fa; }
    .brand-header { background-color: #1a3c5e; color: #fff; padding: 0.75rem 1.5rem; }
    .brand-header h1 { font-size: 1.4rem; margin: 0; letter-spacing: 0.04em; }
    .balance-badge { font-size: 1.1rem; font-weight: 600; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header class="brand-header">
    <h1>&#127968; SecureBank</h1>
  </header>

  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-5">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Withdraw</li>
          </ol>
        </nav>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h4 class="card-title mb-1">
              <span style="color:#dc3545;">&#8595;</span> Withdraw Funds
            </h4>
            <p class="text-muted mb-3" style="font-size:0.85rem;">Enter the amount you wish to withdraw</p>

            <!-- Current balance display -->
            {% if balance is defined %}
            <div class="alert alert-light border mb-4 py-2">
              <span class="text-muted" style="font-size:0.85rem;">Available balance:</span>
              <span class="balance-badge ms-2 text-success">${{ "%.2f"|format(balance) }}</span>
            </div>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{ error }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <form method="POST" action="/withdraw" novalidate>
              <div class="mb-4">
                <label for="amount" class="form-label fw-semibold">Withdrawal Amount ($)</label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number" step="0.01" min="0.01" class="form-control form-control-lg"
                         id="amount" name="amount" placeholder="0.00" required>
                </div>
                <div class="form-text">Amount cannot exceed your available balance</div>
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-danger btn-lg">Confirm Withdrawal</button>
                <a href="/dashboard" class="btn btn-outline-secondary">Back to Dashboard</a>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
